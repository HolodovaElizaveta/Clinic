<!-- clinic/templates/registration/login.html -->
{% extends 'clinic/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 2rem auto;">
    <h2>Вход в систему</h2>
    {% if form.errors %}
        <p style="color: red;">Неверный логин или пароль.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div>
            <label>Имя пользователя:</label>
            {{ form.username }}
        </div>
        <div>
            <label>Пароль:</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p><a href="{% url 'main' %}">← Назад на главную</a></p>
</div>
{% endblock %}
